<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PluginHub</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Landing page -->
<section id="landing">
  <div class="landing-content">
    <h1>Bienvenido a PluginHub</h1>
    <p>Busca aquí el plugin perfecto para tu servidor. ¡Gratis y fácil de descargar!</p>
    <input id="landing-search" type="text" placeholder="Busca un plugin...">
    <div class="landing-buttons">
      <button onclick="goToSection('plugins-section')">Plugins</button>
      <button onclick="goToSection('info-section')">Info</button>
    </div>
  </div>
</section>

<!-- Sección de Plugins -->
<section id="plugins-section">
  <h2 class="section-title">Plugins</h2>
  <div id="category-filter" style="text-align:center; margin:1rem 0;"></div>
  <main class="plugin-grid" id="plugins"></main>
</section>

<!-- Sección de Info -->
<section id="info-section">
  <h2 class="section-title">Información</h2>
  <p style="text-align:center; padding:1rem;">Aquí puedes poner instrucciones, guías o noticias sobre tus plugins y servidores.</p>
</section>

<footer>
  <p>© 2026 Horus-Clan</p>
</footer>

<script src="script.js"></script>
</body>
</html>
